<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuánto me conoces - Para Naara</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #0b132b; 
            color: #e0e1dd;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        /* Fondo de estrellas */
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* Contenedor del Quiz */
        .quiz-container {
            background: rgba(224, 225, 221, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(224, 225, 221, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%; max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 10;
            animation: fadeIn 1.5s ease forwards;
        }

        .quiz-header h1 {
            font-size: 2.2rem; margin-top: 0; margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .quiz-header p {
            color: #f4d06f; font-style: italic; font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Preguntas y Opciones */
        #question-text {
            font-size: 1.4rem; margin-bottom: 30px; line-height: 1.4;
        }

        .options-grid {
            display: flex; flex-direction: column; gap: 15px;
        }

        .option-btn {
            padding: 15px 20px;
            background: transparent;
            border: 1px solid #e0e1dd;
            color: #e0e1dd;
            border-radius: 15px;
            font-family: 'Arial', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: #e0e1dd; color: #0b132b;
            box-shadow: 0 0 15px rgba(224, 225, 221, 0.3);
        }

        /* Pantalla final del Quiz */
        #result-container { display: none; }
        .score-text { font-size: 2rem; color: #f4d06f; margin: 20px 0; }
        
        #final-gif {
            max-width: 80%;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* Pantalla de Feedback (GIFs) */
        .feedback-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 19, 43, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .feedback-overlay.active { opacity: 1; pointer-events: all; }

        .feedback-overlay img {
            max-width: 80%; max-height: 40vh;
            border-radius: 15px; box-shadow: 0 0 30px rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .feedback-text {
            font-size: 1.8rem; font-style: italic; margin-bottom: 30px; text-align: center;
        }

        .next-btn {
            padding: 12px 30px; background: transparent; border: 1px solid #f4d06f; color: #f4d06f;
            border-radius: 25px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s;
        }
        .next-btn:hover { background: #f4d06f; color: #0b132b; }

        /* Botón volver genérico */
        .back-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 10px 25px; background: rgba(224, 225, 221, 0.1); border: 1px solid #e0e1dd;
            color: #e0e1dd; border-radius: 20px; text-decoration: none; font-family: 'Arial', sans-serif;
            text-transform: uppercase; letter-spacing: 1px; z-index: 30; transition: all 0.3s ease; font-size: 0.8rem;
        }
        .back-btn:hover { background: #e0e1dd; color: #0b132b; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="quiz-container" id="quizBox">
        <div class="quiz-header">
            <h1>Nuestra Trivia</h1>
            <p>Veamos qué tan buena memoria tienes...</p>
        </div>
        
        <div id="question-container">
            <div id="question-text">¿Cargando pregunta...?</div>
            <div class="options-grid" id="options-grid">
                </div>
        </div>

        <div id="result-container">
            <h2>¡Terminamos!</h2>
            <div class="score-text" id="score-text"></div>
            <img src="" id="final-gif" alt="Resultado Final">
            <p id="final-message" style="font-size: 1.2rem; line-height: 1.5; margin-bottom: 30px;"></p>
            <a href="index.html" class="option-btn" style="text-decoration: none; display: inline-block;">Volver al inicio</a>
        </div>
    </div>

    <div class="feedback-overlay" id="feedbackOverlay">
        <img src="" alt="Feedback" id="feedbackGif">
        <div class="feedback-text" id="feedbackText"></div>
        <button class="next-btn" id="nextQuestionBtn">Continuar</button>
    </div>

    <a href="index.html" class="back-btn" id="globalBackBtn">Volver</a>

    <script>
        const particlesContainer = document.getElementById('particles');
        for(let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute'; particle.style.width = (Math.random() * 3 + 1) + 'px'; particle.style.height = particle.style.width; particle.style.background = '#ffffff'; particle.style.borderRadius = '50%'; particle.style.left = Math.random() * 100 + 'vw'; particle.style.top = Math.random() * 100 + 'vh'; particle.style.opacity = Math.random() * 0.5 + 0.1; particle.style.animation = `twinkle ${Math.random() * 4 + 2}s infinite alternate ease-in-out`; particlesContainer.appendChild(particle);
        }
        const style = document.createElement('style'); style.innerHTML = `@keyframes twinkle { 0% { transform: scale(0.8); opacity: 0.1; } 100% { transform: scale(1.5); opacity: 0.8; } }`; document.head.appendChild(style);

        // ==========================================
        // PREGUNTAS ACTUALIZADAS
        // ==========================================
        const questions = [
            {
                question: "¿Qué comimos la primera vez que nos volvimos a ver?",
                options: ["Pollo a la naranja", "Subway", "Carl's Jr", "Palomitas del cine"],
                correctIndex: 0 
            },
            {
                question: "¿Cuál es mi comida favorita que me encanta que comamos juntos?",
                options: ["Pizza", "Sushi", "Hamburguesas", "pollo a la naranja"],
                correctIndex: 2
            },
            {
                question: "¿Qué día nos hicimos novios oficialmente?",
                options: ["12 de Octubre", "14 de Febrero", "20 de febrero", "5 de Enero"],
                correctIndex: 1
            },
            {
                question: "¿Qué es lo que más me gusta de ti?",
                options: ["Tus ojos color miel", "Tu sonrisa", "Tu forma de ser", "¡Todo lo anterior y más!"],
                correctIndex: 3
            },
            {
                question: "¿Cuál es el color favorito que me dijiste la primera vez?",
                options: ["Rojo", "Azul pastel", "Verde", "Negro"],
                correctIndex: 1
            },
            {
                question: "La primera vez que hablamos de hijos... ¿Qué nombres les pusimos?",
                options: ["Mateo y Valeria", "Kenneth y Sofía", "Santiago y Mía", "Leonardo y Camila"],
                correctIndex: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const questionContainer = document.getElementById('question-container');
        const resultContainer = document.getElementById('result-container');
        const scoreText = document.getElementById('score-text');
        const finalMessage = document.getElementById('final-message');
        const finalGif = document.getElementById('final-gif');
        const globalBackBtn = document.getElementById('globalBackBtn');

        const feedbackOverlay = document.getElementById('feedbackOverlay');
        const feedbackGif = document.getElementById('feedbackGif');
        const feedbackText = document.getElementById('feedbackText');
        const nextQuestionBtn = document.getElementById('nextQuestionBtn');

        function loadQuestion() {
            const currentQ = questions[currentQuestionIndex];
            questionText.innerText = currentQ.question;
            optionsGrid.innerHTML = ''; 

            currentQ.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(index);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex) {
            const currentQ = questions[currentQuestionIndex];
            const isCorrect = (selectedIndex === currentQ.correctIndex);

            if(isCorrect) {
                score++;
                feedbackGif.src = 'buenita.gif';
                feedbackText.innerText = '¡Acertaste, mi niña hermosa! ❤️';
                feedbackText.style.color = '#ff9a9e'; 
            } else {
                feedbackGif.src = 'malita.gif';
                feedbackText.innerText = 'Uy... fallaste, chiquita. 💔';
                feedbackText.style.color = '#e0e1dd'; 
            }

            feedbackOverlay.classList.add('active');
        }

        nextQuestionBtn.onclick = () => {
            feedbackOverlay.classList.remove('active');
            
            setTimeout(() => {
                currentQuestionIndex++;
                if(currentQuestionIndex < questions.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 400);
        };

        function showResults() {
            questionContainer.style.display = 'none';
            resultContainer.style.display = 'block';
            globalBackBtn.style.display = 'none'; 

            scoreText.innerText = `${score} / ${questions.length}`;

            // Lógica para el GIF y mensaje final según la puntuación
            if(score === questions.length) {
                finalGif.src = 'perfecto1.gif';
                finalMessage.innerText = "¡Eres la mejor! Te acordaste de todo. Te amo muchísimo.";
            } else if (score === 0) {
                finalGif.src = 'triste1.gif';
                finalMessage.innerText = "Ay... ¡Por eso me fallas tanto! Qué bárbaro, eh...";
            } else {
                finalGif.src = 'mitad1.gif';
                finalMessage.innerText = "Mmm, más o menos eh... Hay que repasar esa historia, chiquita.";
            }
        }

        loadQuestion();
    </script>
</body>
</html>
