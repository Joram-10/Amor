<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Recuerdos - Para Naara</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b132b; 
            color: #e0e1dd;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo de estrellitas */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Título del Álbum */
        .header {
            text-align: center;
            padding: 50px 20px 20px;
            z-index: 10;
            position: relative;
            animation: fadeIn 2s ease forwards;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 400;
            cursor: help; /* Gatillo Easter Egg */
        }

        .header p {
            font-style: italic;
            color: #f4d06f; 
            font-size: 1.2rem;
        }

        /* Cuadrícula de la Galería */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px 40px 100px; 
            max-width: 1000px;
            margin: 0 auto;
            z-index: 10;
            position: relative;
        }

        /* Tarjetas de fotos tipo Polaroid oscura */
        .photo-card {
            background: rgba(224, 225, 221, 0.05); 
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(224, 225, 221, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1s ease forwards;
        }

        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(224, 225, 221, 0.15);
            border-color: rgba(224, 225, 221, 0.3);
        }

        .photo-card img {
            width: 100%;
            height: 300px; 
            object-fit: cover; 
            border-radius: 8px;
        }

        .caption {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
            font-style: italic;
        }

        /* Tiempos de animación escalonados */
        .photo-card:nth-child(1) { animation-delay: 0.2s; }
        .photo-card:nth-child(2) { animation-delay: 0.4s; }
        .photo-card:nth-child(3) { animation-delay: 0.6s; }
        .photo-card:nth-child(4) { animation-delay: 0.8s; }
        .photo-card:nth-child(5) { animation-delay: 1.0s; }
        .photo-card:nth-child(6) { animation-delay: 1.2s; }

        /* Botón para Regresar */
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background-color: rgba(11, 19, 43, 0.8);
            border: 1px solid #e0e1dd;
            color: #e0e1dd;
            border-radius: 25px;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 30;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px); 
        }

        .back-btn:hover {
            background-color: #e0e1dd;
            color: #0b132b;
        }

        /* --- EFECTO LIGHTBOX --- */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 19, 43, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
            transform: scale(0.8);
            transition: transform 0.4s ease;
        }

        .lightbox.active img {
            transform: scale(1);
        }

        /* --- ESTILOS DEL EASTER EGG --- */
        .easter-egg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 5, 20, 0.98); 
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .easter-egg-overlay.active { opacity: 1; pointer-events: all; }

        .easter-egg-content {
            text-align: center; max-width: 80%; position: relative;
            background: rgba(11, 19, 43, 0.6); padding: 30px;
            border-radius: 20px; border: 2px solid #00c3ff; 
            box-shadow: 0 0 30px rgba(0, 195, 255, 0.5);
        }

        .easter-egg-content img { max-width: 100%; max-height: 50vh; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 195, 255, 0.3); }

        .easter-egg-text {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1.3rem; color: #caf0f8; 
            line-height: 1.6; margin: 0;
        }

        .easter-egg-text span { color: #00c3ff; font-weight: 600; }

        .close-egg { position: absolute; top: 10px; right: 20px; font-size: 2rem; color: #e0e1dd; cursor: pointer; transition: color 0.3s; }
        .close-egg:hover { color: #00c3ff; }

        /* Animaciones */
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="header">
        <h1 id="easterEggTrigger">Nuestra Historia</h1>
        <p>Los mejores momentos contigo</p>
    </div>

    <div class="gallery">
        <div class="photo-card">
            <img src="1.jpeg" alt="Recuerdo 1">
            <div class="caption">Mi favorita</div>
        </div>
        <div class="photo-card">
            <img src="2.jpeg" alt="Recuerdo 2">
            <div class="caption">Aquel día increíble</div>
        </div>
        <div class="photo-card">
            <img src="3.jpeg" alt="Recuerdo 3">
            <div class="caption">Esa sonrisa tuya</div>
        </div>
        <div class="photo-card">
            <img src="4.jpeg" alt="Recuerdo 4">
            <div class="caption">Nosotros</div>
        </div>
        <div class="photo-card">
            <img src="5.jpeg" alt="Recuerdo 5">
            <div class="caption">Momentos mágicos</div>
        </div>
        <div class="photo-card">
            <img src="6.jpeg" alt="Recuerdo 6">
            <div class="caption">Y los que faltan...</div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <img src="" alt="Foto expandida" id="lightbox-img">
    </div>

    <a href="index.html" class="back-btn">Volver al inicio</a>

    <div id="easterEggOverlay" class="easter-egg-overlay">
        <div class="easter-egg-content">
            <span id="closeEasterEgg" class="close-egg">×</span>
            <img src="rosa1.gif" alt="Rosa Azul Imposible">
            <p class="easter-egg-text">yo antes te dije que haria posible lo imposible, ahora te digo que <span>contigo, el 'para siempre' es mi realidad favorita.</span> ❤️</p>
        </div>
    </div>

    <script>
        // 1. Lógica del Fondo
        const particlesContainer = document.getElementById('particles');
        for(let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = (Math.random() * 3 + 1) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = '#ffffff';
            particle.style.borderRadius = '50%';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.opacity = Math.random() * 0.5 + 0.1;
            particle.style.animation = `twinkle ${Math.random() * 4 + 2}s infinite alternate ease-in-out`;
            particlesContainer.appendChild(particle);
        }
        const style = document.createElement('style');
        style.innerHTML = `@keyframes twinkle { 0% { transform: scale(0.8); opacity: 0.1; } 100% { transform: scale(1.5); opacity: 0.8; } }`;
        document.head.appendChild(style);

        // 2. Lógica del Lightbox 
        const photoCards = document.querySelectorAll('.photo-card img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        photoCards.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src; 
                lightbox.classList.add('active'); 
            });
        });

        lightbox.addEventListener('click', (e) => {
            // Cierra solo si no le dan clic a la imagen directamente
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });

        // 3. LÓGICA DEL EASTER EGG
        const eeTrigger = document.getElementById('easterEggTrigger'); 
        const eeOverlay = document.getElementById('easterEggOverlay'); 
        const eeClose = document.getElementById('closeEasterEgg');
        
        eeTrigger.addEventListener('click', () => { 
            eeOverlay.classList.add('active'); 
        }); 
        
        eeClose.addEventListener('click', () => { 
            eeOverlay.classList.remove('active'); 
        }); 
        
        eeOverlay.addEventListener('click', (e) => { 
            if (e.target === eeOverlay) { 
                eeOverlay.classList.remove('active'); 
            } 
        });
    </script>
</body>
</html>
