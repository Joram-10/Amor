<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razones para amarte - Para Naara</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #0b132b; 
            color: #e0e1dd;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        /* Fondo de estrellas */
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .container {
            text-align: center;
            z-index: 10;
            animation: fadeIn 2s ease forwards;
            width: 90%;
            max-width: 600px;
        }

        .header h1 {
            font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 2px;
            cursor: help; /* Gatillo del Easter Egg */
        }

        .header p {
            font-style: italic; color: #f4d06f; font-size: 1.2rem; margin-bottom: 40px;
        }

        /* Tarjeta de Cristal para la Frase */
        .reason-card {
            background: rgba(224, 225, 221, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(224, 225, 221, 0.15);
            border-radius: 20px;
            padding: 40px 30px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            margin-bottom: 40px;
        }

        #reasonText {
            font-size: 1.6rem;
            line-height: 1.5;
            color: #ffffff;
            transition: opacity 0.5s ease; /* Transición suave al cambiar frase */
        }

        /* Botón Generador */
        .generate-btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #f4d06f;
            color: #f4d06f;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(244, 208, 111, 0.2);
        }

        .generate-btn:hover {
            background: #f4d06f;
            color: #0b132b;
            box-shadow: 0 0 25px rgba(244, 208, 111, 0.6);
            transform: translateY(-3px);
        }

        .back-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 10px 25px; background: rgba(224, 225, 221, 0.1); border: 1px solid #e0e1dd;
            color: #e0e1dd; border-radius: 20px; text-decoration: none; font-family: 'Arial', sans-serif;
            text-transform: uppercase; letter-spacing: 1px; z-index: 30; transition: all 0.3s ease; font-size: 0.8rem;
        }
        .back-btn:hover { background: #e0e1dd; color: #0b132b; }

        /* --- ESTILOS DEL EASTER EGG --- */
        .easter-egg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 5, 20, 0.98); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        .easter-egg-overlay.active { opacity: 1; pointer-events: all; }
        .easter-egg-content { text-align: center; max-width: 80%; position: relative; background: rgba(11, 19, 43, 0.6); padding: 30px; border-radius: 20px; border: 2px solid #00c3ff; box-shadow: 0 0 30px rgba(0, 195, 255, 0.5); }
        .easter-egg-content img { max-width: 100%; max-height: 50vh; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 195, 255, 0.3); }
        .easter-egg-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem; color: #caf0f8; line-height: 1.6; margin: 0; }
        .easter-egg-text span { color: #00c3ff; font-weight: 600; }
        .close-egg { position: absolute; top: 10px; right: 20px; font-size: 2rem; color: #e0e1dd; cursor: pointer; transition: color 0.3s; }
        .close-egg:hover { color: #00c3ff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <h1 id="easterEggTrigger">Mil razones más</h1>
            <p>Toca el botón cuando me extrañes...</p>
        </div>

        <div class="reason-card">
            <div id="reasonText">Eres la casualidad más bonita que llegó a mi vida.</div>
        </div>

        <button class="generate-btn" id="generateBtn">Dime otra razón</button>
    </div>

    <a href="index.html" class="back-btn">Volver al inicio</a>

    <div id="easterEggOverlay" class="easter-egg-overlay">
        <div class="easter-egg-content">
            <span id="closeEasterEgg" class="close-egg">×</span>
            <img src="rosa1.gif" alt="Rosa Azul Imposible">
            <p class="easter-egg-text">yo antes te dije que haria posible lo imposible, ahora te digo que <span>contigo, el 'para siempre' es mi realidad favorita.</span> ❤️</p>
        </div>
    </div>

    <script>
        // 1. Fondo de Estrellas
        const particlesContainer = document.getElementById('particles');
        for(let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute'; particle.style.width = (Math.random() * 3 + 1) + 'px'; particle.style.height = particle.style.width; particle.style.background = '#ffffff'; particle.style.borderRadius = '50%'; particle.style.left = Math.random() * 100 + 'vw'; particle.style.top = Math.random() * 100 + 'vh'; particle.style.opacity = Math.random() * 0.5 + 0.1; particle.style.animation = `twinkle ${Math.random() * 4 + 2}s infinite alternate ease-in-out`; particlesContainer.appendChild(particle);
        }
        const style = document.createElement('style'); style.innerHTML = `@keyframes twinkle { 0% { transform: scale(0.8); opacity: 0.1; } 100% { transform: scale(1.5); opacity: 0.8; } }`; document.head.appendChild(style);


        // ==========================================
        // 2. TUS RAZONES (Puedes agregar todas las que quieras)
        // ==========================================
        const razones = [
            "Porque tus ojos color miel son mi refugio favorito.",
            "Por la forma en la que sonríes cuando me ves.",
            "Porque compartir unas hamburguesas contigo es el mejor plan del mundo.",
            "Porque desde el 14 de febrero mi vida tiene mucho más color.",
            "Por lo mucho que me apoyas en todos mis proyectos.",
            "Porque me encanta imaginar nuestro futuro con Sofía y Kenneth.",
            "Porque haces que los días malos se sientan un poquito más ligeros.",
            "Porque amo la paz que siento cuando estoy contigo.",
            "Porque cada que escucho 'Are You Bored Yet?' pienso en ti.",
            "Simplemente porque eres tú, Naara, y no hay nadie como tú."
        ];

        const reasonText = document.getElementById('reasonText');
        const generateBtn = document.getElementById('generateBtn');

        generateBtn.addEventListener('click', () => {
            // Difuminar texto actual
            reasonText.style.opacity = 0;

            setTimeout(() => {
                // Elegir una razón aleatoria
                const randomIndex = Math.floor(Math.random() * razones.length);
                reasonText.innerText = razones[randomIndex];
                
                // Mostrar nuevo texto
                reasonText.style.opacity = 1;
            }, 500); // Espera medio segundo (lo que dura la transición CSS)
        });

        // 3. LÓGICA DEL EASTER EGG
        const eeTrigger = document.getElementById('easterEggTrigger'); 
        const eeOverlay = document.getElementById('easterEggOverlay'); 
        const eeClose = document.getElementById('closeEasterEgg');
        
        eeTrigger.addEventListener('click', () => { eeOverlay.classList.add('active'); }); 
        eeClose.addEventListener('click', () => { eeOverlay.classList.remove('active'); }); 
        eeOverlay.addEventListener('click', (e) => { if (e.target === eeOverlay) { eeOverlay.classList.remove('active'); } });
    </script>
</body>
</html>
